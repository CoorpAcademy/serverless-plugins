service: serverless-offline-sqs

provider:
  name: aws
  region: eu-west-1
  runtime: nodejs18.x

plugins:
  - ../../packages/serverless-offline-sqs
  - serverless-offline

functions:
  autoCreatedHandler:
    handler: lambda/handler.callback
    events:
      - sqs: arn:aws:sqs:region:XXXXXX:AutocreatedImplicitQueue
      - sqs:
          queueName: AutocreatedQueue
          arn:
            Fn::GetAtt:
              - AutocreatedQueue
              - Arn
      - sqs:
          queueName: AutocreatedFifoQueue.fifo
          arn:
            Fn::GetAtt:
              - AutocreatedFifoQueue
              - Arn

resources:
  Resources:
    AutocreatedQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: AutocreatedQueue
    AutocreatedFifoQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: AutocreatedFifoQueue.fifo
        FifoQueue: true
        MessageRetentionPeriod: 1209600
        ContentBasedDeduplication: true
        # NOTE: a RedrivePolicy (DLQ) + Policy with CloudFormation intrinsics (Fn::GetAtt/Ref) used
        # to live here, but autoCreate does not implement DLQ-from-RedrivePolicy against ElasticMQ
        # (the resolved deadLetterTargetArn region never matches ElasticMQ's). That is the deferred
        # community feature #183 — its fixture belongs with that implementation, not here.

custom:
  serverless-offline:
    httpPort: 3424
    lambdaPort: 3042
  serverless-offline-sqs:
    endpoint: http://localhost:9324
    accessKeyId: local
    secretAccessKey: local
    autoCreate: true
