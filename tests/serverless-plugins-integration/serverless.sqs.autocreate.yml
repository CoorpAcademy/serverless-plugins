service: serverless-offline-sqs

provider:
  name: aws
  region: eu-west-1
  runtime: nodejs18.x

plugins:
  - ../../packages/serverless-offline-sqs
  - serverless-offline

functions:
  autoCreatedHandler:
    handler: lambda/handler.callback
    events:
      - sqs: arn:aws:sqs:region:XXXXXX:AutocreatedImplicitQueue
      - sqs:
          queueName: AutocreatedQueue
          arn:
            Fn::GetAtt:
              - AutocreatedQueue
              - Arn
      - sqs:
          queueName: AutocreatedFifoQueue.fifo
          arn:
            Fn::GetAtt:
              - AutocreatedFifoQueue
              - Arn
      # #167/#133/#65: a queue whose RedrivePolicy points at a DLQ declared only in Resources.
      - sqs:
          queueName: MainQueue
          arn:
            Fn::GetAtt:
              - MainQueue
              - Arn

resources:
  Resources:
    AutocreatedQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: AutocreatedQueue
    AutocreatedFifoQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: AutocreatedFifoQueue.fifo
        FifoQueue: true
        MessageRetentionPeriod: 1209600
        ContentBasedDeduplication: true
    # #167/#133/#65/#87: MainQueue redrives to MainDlq via RedrivePolicy.deadLetterTargetArn
    # (a resolved Fn::GetAtt Arn). MainDlq is declared ONLY here and is bound to no function, yet
    # autoCreate must still create it — and create it BEFORE MainQueue so the RedrivePolicy resolves
    # offline instead of failing with AWS.SimpleQueueService.NonExistentQueue.
    MainQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: MainQueue
        MessageRetentionPeriod: 1209600
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt:
              - MainDlq
              - Arn
          maxReceiveCount: 5
    MainDlq:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: MainDlq

custom:
  serverless-offline:
    httpPort: 3424
    lambdaPort: 3042
  serverless-offline-sqs:
    endpoint: http://localhost:9324
    accessKeyId: local
    secretAccessKey: local
    autoCreate: true
